services:
  teams-bot:
    image: dystian/microsoft-teams-bot:latest
    shm_size: '2gb'
    container_name: microsoft-teams-bot
    restart: always
    network_mode: host
    env_file: .env
    environment:
      - DISPLAY=:1
      - XAUTHORITY=/root/.Xauthority
    volumes:
      - /home/zulpanpratama/.Xauthority:/root/.Xauthority:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
