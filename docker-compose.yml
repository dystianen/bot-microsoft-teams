services:
  teams-bot:
    image: dystian/microsoft-teams-bot:latest
    container_name: microsoft-teams-bot
    env_file: .env

    init: true

    network_mode: host
    ipc: host
    shm_size: '2gb'

    security_opt:
      - seccomp:unconfined

    cap_add:
      - SYS_ADMIN

    environment:
      - DISPLAY=:20
      - QT_X11_NO_MITSHM=1

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 10G
