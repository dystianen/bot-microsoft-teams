services:
  teams-bot:
    image: dystian/microsoft-teams-bot:latest
    container_name: microsoft-teams-bot

    network_mode: host
    ipc: host
    shm_size: '2gb'

    security_opt:
      - seccomp:unconfined

    cap_add:
      - SYS_ADMIN

    environment:
      - DISPLAY=:1
      - XAUTHORITY=/root/.Xauthority
      - QT_X11_NO_MITSHM=1

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /home/zulpanpratama/.Xauthority:/root/.Xauthority:rw
