name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Key
        run: |
          echo "${{ secrets.VPS_PRIVATE_KEY_B64 }}" | base64 -d > key
          chmod 600 key

      - name: Test SSH (debug)
        run: |
          ssh -i key -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "echo CONNECTED"

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key_path: 
          port: 22
          debug: true
          script: |
            cd ${{ secrets.TARGET_DIR }}
            git pull origin main
            npm install --production
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save